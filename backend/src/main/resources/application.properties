server.port=8080

spring.datasource.url=jdbc:sqlite:designerjobs.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Disable Spring Security's default login page for now
spring.security.user.name=dev
spring.security.user.password=dev

# Path to the frontend static files (relative to the backend working directory)
app.frontend.path=../frontend/design1/
