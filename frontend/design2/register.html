<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — DESIGNJOBS.COM</title>

  <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'light')</script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles_bootstrap+.css">
</head>
<body>

  <main class="auth-page" style="align-items: start; padding-top: 3rem">
    <div class="auth-box p-4 p-md-5" style="max-width: 520px">

      <p class="eyebrow mb-2">Create your account</p>
      <h1 class="mb-5" style="font-size:var(--fs-xl)">Join the Platform</h1>

      <!-- Role selector -->
      <div class="mb-3">
        <p class="field-label">I am a…</p>
        <div class="type-switcher" id="role-toggle" role="group" aria-label="Account type">
          <button type="button" class="selected" data-role="designer">Designer</button>
          <button type="button" data-role="client">Client</button>
        </div>
      </div>

      <form id="register-form" action="#" method="post" novalidate>
        <input type="hidden" name="role" id="role-input" value="designer">

        <div class="mb-3">
          <label class="field-label" for="full-name">Full name</label>
          <input class="field-input" type="text" id="full-name" name="name"
                 placeholder="Ada Lovelace" autocomplete="name" required>
        </div>

        <div class="mb-3">
          <label class="field-label" for="email">Email address</label>
          <input class="field-input" type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="mb-3">
          <label class="field-label" for="password">Password</label>
          <input class="field-input" type="password" id="password" name="password"
                 placeholder="at least 8 characters" autocomplete="new-password" required>
        </div>

        <!-- Designer-only fields -->
        <div id="designer-fields">
          <div class="mb-3">
            <label class="field-label" for="design-type">Primary design type</label>
            <select class="field-select" id="design-type" name="designType">
              <option value="">Select…</option>
              <option>UI/UX Design</option>
              <option>Graphic Design</option>
              <option>Web Design</option>
              <option>Interior Design</option>
              <option>Motion Design</option>
              <option>Illustration</option>
              <option>Brand Identity</option>
              <option>Logo Design</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="field-label" for="skills">
              Skills
              <span style="opacity:.5;text-transform:none;letter-spacing:0">(comma-separated)</span>
            </label>
            <input class="field-input" type="text" id="skills" name="skills"
                   placeholder="Figma, Typography, Branding, Prototyping…">
          </div>
        </div>

        <button type="submit" class="stamp-btn filled w-100 mt-2" style="justify-content: center">
          Create Account
        </button>
      </form>

      <div class="text-divider my-4">or</div>

      <p class="text-center mb-0" style="font-family:var(--font-ui);font-size:var(--fs-xs);letter-spacing:.18em;text-transform:uppercase">
        Already a member? <a href="login.html">Login</a>
      </p>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    const btns = document.querySelectorAll('.type-switcher button');
    const designerFields = document.getElementById('designer-fields');
    const roleInput = document.getElementById('role-input');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const role = btn.dataset.role;
        roleInput.value = role;
        designerFields.style.display = role === 'designer' ? '' : 'none';
      });
    });

    document.getElementById('register-form').addEventListener('submit', e => {
      e.preventDefault();
      // TODO: POST /auth/register
      console.log('register:', Object.fromEntries(new FormData(e.target)));
    });
  </script>
</body>
</html>
