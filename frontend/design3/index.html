<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DESIGNJOBS.COM</title>

  <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'light')</script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">

  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; overflow: hidden; }
    .shell-frame { flex: 1; min-height: 0; }
    #content-frame { display: block; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>

  <!-- SHELL NAV -->
  <nav class="navbar navbar-expand-lg bg-primary py-3" data-bs-theme="dark" style="min-height:80px; border-bottom:2px solid #6D28D9">
    <div class="container-xxl">
      <a class="navbar-brand fw-bold font-monospace text-white text-uppercase" href="#" id="brand-link" style="letter-spacing:.12em; font-size:1.2rem">DESIGNJOBS.COM</a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#nav-menu"
              aria-controls="nav-menu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav-menu">
        <ul class="navbar-nav mx-auto gap-lg-4">
          <li class="nav-item"><a class="nav-link fw-bold text-uppercase font-monospace" href="#" data-page="about.html" style="letter-spacing:.18em; font-size:.88rem">About Us</a></li>
          <li class="nav-item"><a class="nav-link fw-bold text-uppercase font-monospace" href="#" data-page="jobs.html" style="letter-spacing:.18em; font-size:.88rem">All Jobs</a></li>
          <li class="nav-item"><a class="nav-link fw-bold text-uppercase font-monospace" href="#" data-page="job-random.html" id="random-link" style="letter-spacing:.18em; font-size:.88rem">Random Job</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2 mt-3 mt-lg-0">
          <button id="theme-toggle" type="button" class="btn btn-outline-light rounded-pill btn-sm fw-bold text-uppercase px-3" style="letter-spacing:.16em">☾ Dark</button>
          <a href="#" class="btn btn-outline-light rounded-pill btn-sm fw-bold text-uppercase px-3" data-page="register.html" style="letter-spacing:.16em">Register</a>
          <a href="#" class="btn btn-outline-light rounded-pill btn-sm fw-bold text-uppercase px-3" data-page="profile.html" style="letter-spacing:.16em">Login</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTENT FRAME -->
  <div class="shell-frame">
    <iframe id="content-frame" src="homepage.html" title="Page content"></iframe>
  </div>

  <!-- SHELL FOOTER -->
  <footer class="bg-primary text-white py-4 mt-auto">
    <div class="container-xxl d-flex flex-wrap justify-content-between align-items-center gap-3">
      <span class="fw-bold font-monospace text-uppercase small" style="letter-spacing:.2em">DESIGNJOBS.COM</span>
      <nav aria-label="Footer navigation" class="font-monospace text-uppercase small" style="letter-spacing:.18em">
        <a href="#" class="text-white text-decoration-none" data-page="about.html">About</a>
        <span class="mx-2 opacity-50">&middot;</span>
        <a href="#" class="text-white text-decoration-none" data-page="impressum.html">Impressum</a>
      </nav>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  (() => {
    'use strict';

    const frame  = document.getElementById('content-frame');
    const toggle = document.getElementById('theme-toggle');
    const allPageLinks = () => document.querySelectorAll('[data-page]');

    const applyTheme = t => {
      document.documentElement.setAttribute('data-bs-theme', t);
      toggle.textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
      localStorage.setItem('theme', t);
      try { frame.contentDocument.documentElement.setAttribute('data-bs-theme', t); } catch (_) {}
    };

    applyTheme(localStorage.getItem('theme') || 'light');

    toggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    });

    const navigate = (page, push = true) => {
      frame.src = page;
      if (push) history.pushState({ page }, '', '#' + page);
      setActive(page);
    };

    const setActive = page => {
      allPageLinks().forEach(a => {
        const match = a.dataset.page === page;
        a.classList.toggle('active', match);
        match ? a.setAttribute('aria-current', 'page') : a.removeAttribute('aria-current');
      });
    };

    allPageLinks().forEach(a => {
      a.addEventListener('click', e => { e.preventDefault(); navigate(a.dataset.page); });
    });

    document.getElementById('brand-link').addEventListener('click', e => {
      e.preventDefault(); navigate('homepage.html');
    });

    frame.addEventListener('load', () => {
      try {
        frame.contentDocument.documentElement.setAttribute(
          'data-bs-theme', localStorage.getItem('theme') || 'light'
        );
        if (frame.contentDocument.title) document.title = frame.contentDocument.title;
        const page = frame.contentWindow.location.pathname.split('/').pop() || 'homepage.html';
        setActive(page);
      } catch (_) {}
    });

    window.addEventListener('popstate', e => {
      const page = e.state?.page || 'homepage.html';
      frame.src = page;
      setActive(page);
    });

    allPageLinks().forEach(a => {
      a.addEventListener('click', () => {
        const collapse = document.getElementById('nav-menu');
        if (collapse.classList.contains('show')) {
          bootstrap.Collapse.getInstance(collapse)?.hide();
        }
      });
    });
  })();
  </script>
</body>
</html>
